<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextToshi | Bio</title>

    <!-- Жирный футуристичный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a0026, #000000 70%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Анимированное фоновое свечение */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(170, 0, 255, 0.4), transparent 70%);
            animation: pulseBg 6s infinite alternate ease-in-out;
            filter: blur(100px);
        }

        @keyframes pulseBg {
            from { transform: scale(0.9); opacity: 0.6; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .content {
            position: relative;
            max-width: 420px;
            width: 100%;
            padding: 40px;
            border: 1px solid rgba(170, 0, 255, 0.4);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            background: rgba(10, 0, 20, 0.6);
            box-shadow:
                0 0 20px rgba(170, 0, 255, 0.4),
                0 0 40px rgba(170, 0, 255, 0.2);
            transition: 0.4s;
        }

        .content:hover {
            box-shadow:
                0 0 30px rgba(170, 0, 255, 0.7),
                0 0 60px rgba(170, 0, 255, 0.4);
            transform: translateY(-5px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #c77dff;
            text-shadow:
                0 0 5px #a100ff,
                0 0 15px #a100ff,
                0 0 30px #6a00ff;
        }

        .tagline {
            color: #b388ff;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 24px;
        }

        .bio {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #f0e6ff;
        }

        .links {
            display: flex;
            gap: 25px;
        }

        .links a {
            font-weight: 700;
            font-size: 15px;
            color: #c77dff;
            text-decoration: none;
            position: relative;
            transition: 0.3s;
        }

        .links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background: #a100ff;
            box-shadow: 0 0 10px #a100ff;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .links a:hover {
            text-shadow:
                0 0 5px #a100ff,
                0 0 15px #a100ff;
        }

        .links a:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Артем / NextToshi</h1>
        <div class="tagline">Спорт • Психология • Код</div>
        
        <div class="bio">
            Я хочу изменить себя к лучшему и изучить код.
        </div>

        <div class="links">
            <a href="https://t.me/NextToshi" target="_blank">Telegram</a>
            <a href="mailto:fxlesses042@gmail.com">Email</a>
        </div>
    </div>

</body>
</html>
